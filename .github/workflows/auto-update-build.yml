# ============================================================
#  auto-update-build.yml  (v3 — Fixed 403 Push Permission)
#  Chạy hàng ngày lúc 04:00 giờ Việt Nam (UTC+7 → 21:00 UTC)
#  Luồng: Keep-alive → Cập nhật thư viện → Build → Release
# ============================================================

name: 🔄 Auto Update & Build

on:
  schedule:
    - cron: "0 21 * * *"

  workflow_dispatch:
    inputs:
      force_release:
        description: "Tạo release dù không có thay đổi deps?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      skip_update:
        description: "Bỏ qua bước update deps, chỉ build?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

# ── FIX 403: Cấp quyền write mặc định cho toàn bộ workflow ──
permissions:
  contents: write
  actions: write

jobs:
  # ─────────────────────────────────────────
  # 0. Keep-alive
  # ─────────────────────────────────────────
  keep-alive:
    name: 💓 Keep Alive
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Re-enable workflow nếu bị disable
        uses: liskin/gh-workflow-keepalive@v1
        with:
          workflow: auto-update-build.yml
        continue-on-error: true

  # ─────────────────────────────────────────
  # 1. Kiểm tra & cập nhật dependency
  # ─────────────────────────────────────────
  update-dependencies:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    needs: keep-alive
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
      new_version: ${{ steps.bump_version.outputs.new_version }}

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true   # ── FIX 403

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 🗃️ Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔍 Đảm bảo Gradle Versions Plugin có trong build.gradle
        if: github.event.inputs.skip_update != 'true'
        run: |
          if ! grep -q "ben-manes.versions" build.gradle 2>/dev/null; then
            echo "⚠️  Chưa có Gradle Versions Plugin — thêm tự động..."
            sed -i '/^plugins\s*{/a\    id("com.github.ben-manes.versions") version "0.51.0"' build.gradle
            echo "PLUGIN_ADDED=true" >> $GITHUB_ENV
          else
            echo "✅ Gradle Versions Plugin đã tồn tại"
            echo "PLUGIN_ADDED=false" >> $GITHUB_ENV
          fi

      - name: 📋 Chạy báo cáo dependency lỗi thời
        if: github.event.inputs.skip_update != 'true'
        run: |
          ./gradlew dependencyUpdates \
            -Drevision=release \
            --no-daemon \
            2>&1 | tee dependency-report.txt || true
          echo "--- Tóm tắt ---"
          grep -E "\->" dependency-report.txt | head -30 || echo "(Không có deps cần update)"

      - name: 🔄 Tự động cập nhật versions trong gradle.properties
        id: auto_update
        if: github.event.inputs.skip_update != 'true'
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          report_file = "dependency-report.txt"
          props_file  = "gradle.properties"
          updated_count = 0

          if not os.path.exists(report_file):
              print("⚠️  Không tìm thấy dependency-report.txt — bỏ qua.")
              sys.exit(0)

          with open(report_file, encoding="utf-8", errors="ignore") as f:
              content = f.read()

          pattern = re.compile(
              r"[\w.\-]+:[\w.\-]+\s+\["
              r"([\d][\w.\-]*)"
              r"\s+->\s+"
              r"([\d][\w.\-]*)"
              r"\]"
          )

          updates = {}
          for cur, new in pattern.findall(content):
              if cur != new:
                  updates[cur] = new
                  print(f"  📌 Phát hiện: {cur} → {new}")

          if not updates:
              print("✅ Không có dependency nào cần cập nhật.")
              sys.exit(0)

          print(f"\n🔄 Tổng cộng {len(updates)} version cần đổi\n")

          if not os.path.exists(props_file):
              print(f"⚠️  Không tìm thấy {props_file} — bỏ qua.")
              sys.exit(0)

          with open(props_file, encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          for line in lines:
              new_line = line
              if re.match(r'^\s*[^#].*=', line):
                  for cur_ver, latest_ver in updates.items():
                      replaced = re.sub(
                          r'(=\s*)' + re.escape(cur_ver) + r'(\s*(?:#.*)?)$',
                          rf'\g<1>{latest_ver}\2',
                          new_line,
                          flags=re.MULTILINE
                      )
                      if replaced != new_line:
                          print(f"  ✏️  Đã sửa: {new_line.strip()}  →  {replaced.strip()}")
                          new_line = replaced
                          updated_count += 1
              new_lines.append(new_line)

          if updated_count > 0:
              with open(props_file, "w", encoding="utf-8") as f:
                  f.writelines(new_lines)
              print(f"\n✅ Đã cập nhật {updated_count} dòng trong {props_file}")
          else:
              print(f"\nℹ️  Không có dòng nào trong {props_file} cần thay đổi.")
          PYEOF

      - name: 🔢 Tăng version patch trong gradle.properties
        id: bump_version
        run: |
          PROPS="gradle.properties"
          CURRENT=""
          for KEY in "version" "pluginVersion" "mod_version" "plugin_version"; do
            CURRENT=$(grep -E "^${KEY}\s*=" "$PROPS" 2>/dev/null \
                      | head -1 | sed 's/.*=\s*//' | tr -d '[:space:]')
            [ -n "$CURRENT" ] && { echo "🔑 Key tìm thấy: $KEY=$CURRENT"; break; }
          done
          [ -z "$CURRENT" ] && CURRENT="1.0.0"

          BASE_VERSION=$(echo "$CURRENT" | sed 's/-auto\.[0-9]*$//')
          echo "📌 Version hiện tại: $BASE_VERSION"

          IFS='.' read -ra P <<< "$BASE_VERSION"
          MAJOR="${P[0]:-1}"
          MINOR="${P[1]:-0}"
          PATCH=$(echo "${P[2]:-0}" | grep -o '^[0-9]*')
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-auto.$(date +%Y%m%d)"
          echo "🆕 Version mới: $NEW_VERSION"

          for KEY in "version" "pluginVersion" "mod_version" "plugin_version"; do
            if grep -qE "^${KEY}\s*=" "$PROPS" 2>/dev/null; then
              sed -i "s|^\(${KEY}\s*=\s*\).*|\1${NEW_VERSION}|" "$PROPS"
              echo "✅ Đã ghi $KEY=$NEW_VERSION vào $PROPS"
              break
            fi
          done

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 🔎 Kiểm tra có thay đổi không
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Không có thay đổi nào."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Phát hiện thay đổi:"
            git diff --stat
          fi

      - name: 💾 Commit cập nhật dependency
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): auto-update dependencies $(date +'%Y-%m-%d')

          🤖 Tự động bởi GitHub Actions
          📅 UTC  : $(date +'%Y-%m-%d %H:%M:%S UTC')
          🕓 VN   : $(TZ=Asia/Ho_Chi_Minh date +'%Y-%m-%d %H:%M:%S')
          🆕 Ver  : ${{ steps.bump_version.outputs.new_version }}"
          # ── FIX 403: Push với token xác thực rõ ràng ─────────
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

  # ─────────────────────────────────────────
  # 2. Build shadowJar
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build Plugin
    runs-on: ubuntu-latest
    needs: update-dependencies

    steps:
      - name: ⬇️ Checkout (sau khi đã cập nhật deps)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 🗃️ Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🛠️ Cấp quyền cho gradlew
        run: chmod +x gradlew

      - name: 🏗️ Build shadowJar
        run: |
          ./gradlew shadowJar \
            --no-daemon \
            --stacktrace

      - name: 📂 Liệt kê JAR artifacts được tạo
        run: |
          echo "=== JAR files ==="
          find . -name "*.jar" -not -path "*/\.*" | sort

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jars-${{ github.run_number }}
          path: |
            assembly/build/libs/*.jar
            bukkit/build/libs/*.jar
            bungee/build/libs/*.jar
            velocity/build/libs/*.jar
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────
  # 3. Tạo GitHub Release
  # ─────────────────────────────────────────
  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [update-dependencies, build]
    if: >
      needs.update-dependencies.outputs.has_changes == 'true' ||
      github.event.inputs.force_release == 'true'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: ⬇️ Download artifacts từ build job
        uses: actions/download-artifact@v4
        with:
          name: plugin-jars-${{ github.run_number }}
          path: ./release-artifacts

      - name: 📂 Liệt kê artifacts
        run: ls -lh ./release-artifacts/ 2>/dev/null || echo "Không có artifact"

      - name: 🏷️ Tạo tag version mới
        id: create_tag
        run: |
          DATE_TAG="auto-$(TZ=Asia/Ho_Chi_Minh date +'%Y%m%d-%H%M')"
          echo "tag=$DATE_TAG" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$DATE_TAG" -m "Auto build: $DATE_TAG"
          # ── FIX 403: Push tag với token rõ ràng ──────────────
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$DATE_TAG"

      - name: 📝 Tạo changelog tự động
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log "$LAST_TAG"..HEAD --oneline --no-merges | head -20 || echo "Không có commit mới")
          else
            LOG=$(git log --oneline --no-merges | head -10 || echo "")
          fi

          cat << EOF > release-notes.md
          ## 🤖 Auto Build — $(TZ=Asia/Ho_Chi_Minh date +'%d/%m/%Y %H:%M') (Giờ VN)

          > Build tự động hàng ngày lúc **04:00 sáng giờ Việt Nam**.

          ### 📦 Version
          \`${{ needs.update-dependencies.outputs.new_version }}\`

          ### 📋 Commits kể từ lần build trước
          \`\`\`
          $LOG
          \`\`\`

          ### 📥 Cách sử dụng
          Tải file JAR phù hợp và đặt vào thư mục \`plugins/\` của server:
          - **Bukkit/Spigot/Paper** → \`MineTraxPlugin-bukkit-*.jar\`
          - **BungeeCord**          → \`MineTraxPlugin-bungee-*.jar\`
          - **Velocity**            → \`MineTraxPlugin-velocity-*.jar\`
          EOF

      - name: 🚀 Tạo GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          name: "🔄 Auto Build — ${{ steps.create_tag.outputs.tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: true
          files: ./release-artifacts/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # 4. Thông báo kết quả
  # ─────────────────────────────────────────
  notify:
    name: 📣 Notify Result
    runs-on: ubuntu-latest
    needs: [update-dependencies, build, release]
    if: always()

    steps:
      - name: ✅ Tóm tắt kết quả workflow
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║     KẾT QUẢ AUTO BUILD & UPDATE      ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 📦 Update deps : ${{ needs.update-dependencies.result }}"
          echo "║ 🔨 Build       : ${{ needs.build.result }}"
          echo "║ 🚀 Release     : ${{ needs.release.result }}"
          echo "║ 🆕 Version     : ${{ needs.update-dependencies.outputs.new_version }}"
          echo "║ 🕓 Giờ VN      : $(TZ=Asia/Ho_Chi_Minh date +'%Y-%m-%d %H:%M:%S')"
          echo "╚══════════════════════════════════════╝"
